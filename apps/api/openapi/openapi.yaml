components:
  schemas:
    AchievementDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        slug:
          type: string
          maxLength: 80
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          maxLength: 160
        description:
          type: string
        criteria: {}
        reward: {}
        active:
          type: boolean
      required:
      - created_at
      - id
      - name
      - slug
      - updated_at
    AppCommand:
      type: object
      properties:
        app_slug:
          type: string
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - app_slug
    AppDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        slug:
          type: string
          maxLength: 60
          pattern: ^[-a-zA-Z0-9_]+$
        default_display_name:
          type: string
          maxLength: 80
        os_display_names: {}
        category:
          type: string
          maxLength: 40
        is_core:
          type: boolean
        is_uninstallable:
          type: boolean
        required_permissions: {}
        icon_key:
          type: string
          maxLength: 80
        default_install_rules: {}
        terminal_command_aliases: {}
      required:
      - category
      - created_at
      - default_display_name
      - icon_key
      - id
      - slug
      - updated_at
    AppInstall:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        app:
          $ref: '#/components/schemas/AppDefinition'
        display_name:
          type: string
          maxLength: 80
        active:
          type: boolean
        settings: {}
        installed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - app
      - display_name
      - id
      - installed_at
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          type: string
          maxLength: 80
        request_id:
          type: string
          maxLength: 64
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - event_type
      - id
    AvailabilityEnum:
      enum:
      - free
      - paid
      - starter
      type: string
      description: |-
        * `free` - Free
        * `paid` - Paid
        * `starter` - Starter
    BrowserResolve:
      type: object
      properties:
        url:
          type: string
          maxLength: 500
      required:
      - url
    CategoryEnum:
      enum:
      - cpu
      - gpu
      - motherboard
      - ram
      - hdd
      - ssd
      - usb
      - case
      - pear_chip
      type: string
      description: |-
        * `cpu` - CPU
        * `gpu` - GPU
        * `motherboard` - Motherboard
        * `ram` - RAM
        * `hdd` - HDD
        * `ssd` - SSD
        * `usb` - USB Stick
        * `case` - Case
        * `pear_chip` - Integrated Pear Chip
    Certificate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          type: string
          maxLength: 20
        expires_at:
          type: string
          format: date-time
        domain:
          type: string
          format: uuid
        owner:
          type: string
          format: uuid
      required:
      - created_at
      - domain
      - expires_at
      - id
      - owner
      - updated_at
    CertificatePurchase:
      type: object
      properties:
        domain_id:
          type: string
          format: uuid
      required:
      - domain_id
    CoinBuy:
      type: object
      properties:
        wallet_id:
          type: string
          format: uuid
        credit_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,8})?$
      required:
      - credit_amount
      - wallet_id
    CoinDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        slug:
          type: string
          maxLength: 60
          pattern: ^[-a-zA-Z0-9_]+$
        symbol:
          type: string
          maxLength: 12
        name:
          type: string
          maxLength: 100
        is_primary:
          type: boolean
        difficulty:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,6})?$
        metadata: {}
      required:
      - created_at
      - id
      - name
      - slug
      - symbol
      - updated_at
    CoinPricePoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        price_at:
          type: string
          format: date-time
        price_credits:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,8})?$
        coin:
          type: string
          format: uuid
      required:
      - coin
      - created_at
      - id
      - price_at
      - price_credits
      - updated_at
    CoinSell:
      type: object
      properties:
        wallet_id:
          type: string
          format: uuid
        coin_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,8})?$
      required:
      - coin_amount
      - wallet_id
    CrackJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        target_ip:
          type: string
          maxLength: 45
        status:
          $ref: '#/components/schemas/CrackJobStatusEnum'
        failure_code:
          type: string
          maxLength: 80
        duration_seconds:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        completed_at:
          type: string
          format: date-time
          nullable: true
        metadata: {}
        attacker:
          type: string
          format: uuid
        attacker_machine:
          type: string
          format: uuid
        target_machine:
          type: string
          format: uuid
          nullable: true
        cracker_software:
          type: string
          format: uuid
          nullable: true
        persisted_job:
          type: string
          format: uuid
          nullable: true
      required:
      - attacker
      - attacker_machine
      - created_at
      - id
      - target_ip
      - updated_at
    CrackJobCreate:
      type: object
      properties:
        attacker_machine_id:
          type: string
          format: uuid
        target_ip:
          type: string
          maxLength: 45
        cracker_software_id:
          type: string
          format: uuid
      required:
      - attacker_machine_id
      - target_ip
    CrackJobStatusEnum:
      enum:
      - queued
      - running
      - succeeded
      - failed
      - cancelled
      - expired
      type: string
      description: |-
        * `queued` - Queued
        * `running` - Running
        * `succeeded` - Succeeded
        * `failed` - Failed
        * `cancelled` - Cancelled
        * `expired` - Expired
    Delivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/DeliveryStatusEnum'
        eta:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true
        claimed_at:
          type: string
          format: date-time
          nullable: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        speed:
          type: string
          maxLength: 20
        idempotency_key:
          type: string
          nullable: true
          maxLength: 120
        metadata: {}
        owner:
          type: string
          format: uuid
